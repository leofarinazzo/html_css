<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exemplo de Hover</title>

    <style>
        body{
            font-family:'Gill Sans', 'Gill Sans MT', Calibri, 'Trebuchet MS', sans-serif;
        }
        div:hover{
            color:brown;
        }

        div > p {
            display: none;
            color: blue;
        }

        div:hover > p {
            display: block;
            color: blue;
            background-color: aquamarine;
            width: 300px;
        }
    </style>

</head>
<body>
    <h1>Exemplo de Hover</h1>
    <p>Passe o mouse sobre este parágrafo. Note que nada aconteceu!</p>
    <div>
    Agora, passe o mouse sobre este parágrafo. Agora sim, algo aconteceu. A cor mudou e algo apareceu!
    <p>Tem um texto escondido aqui.</p>
    </div>
    <p>Fim do exeplo.</p>
    
</body>
</html>
