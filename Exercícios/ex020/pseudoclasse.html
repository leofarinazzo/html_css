<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pseudoclasse</title>
    <style>
        div{
            display:inline-block;
            background-color: burlywood;
            border: 1px solid black;
            text-align: center;
            height: 200px;
            width: 200px;
        }
    
    
        div:hover{
            background-color: chartreuse;
        }


    </style>
</head>
<body>
    <div id="d1">caixa1</div>
    <div id="d2">caixa2</div>
    <div id="d3">caixa3</div>    
</body>
</html>

<!-- As pseudoclasse tem que está relacionada a um elemento ou a uma classe. Relacionada ao estado de um elemento (ativo, marcado, vazio, habilitado.) -->
