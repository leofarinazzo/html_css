<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Links</title>

    <style>
        body{
            font-family: 'Gill Sans', 'Gill Sans MT', Calibri, 'Trebuchet MS', sans-serif;
        }

        a {
            color: chocolate;
            text-decoration: none;
            font-weight: lighter;
        }

        a:visited{
            color: cornflowerblue;
        }

        a:hover{
            text-decoration: underline;
            color: black;
        }

        a:active{
            color: aqua;
        }

        .especial{
            background-color: rgb(219, 202, 181);
        }
        
        .especial::before{
            content: "⇒";
        }
        
        .especial::after{
            content: "⇐";
        }        

        /*
        Simbologia
        # = id
        . = class
        : = pseudo-class
        :: = pseudo-elemnt
        > = children
        */

        /*
        Os pseudoelementos muda o conteúdo (content) do HTML sem precisar modificá-lo. Acrescenta coisas ao um conteúdo, coisas antes e depois.
        */

    </style>
</head>
<body>
    <h1>Personalizando Links</h1>
    <ul>
        <li><a href="https://www.instagram.com/leofarinazzo.fisio/" target="_blank">Perfil do Instagram</a></li>
        <li><a href="https://www.linkedin.com/in/leonardofarinazzo/" class="especial">Perfil do Linkedin</a></li>
        <li><a href="https://github.com/">Repositório GitHub</a></li>
    </ul>
</body>
</html>
