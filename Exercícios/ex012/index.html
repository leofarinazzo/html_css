<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vídeos com HTML</title>
</head>
<body>
    <h1>Inserindo vídeos hospedados localmente</h1>
    <p>Este video está hospedado no meu próprio servidor.</p>

    <video width=500 poster="imagens/capa-dog.png" controls autoplay loop>
        <source src="midia/video-dog-mp4.mp4" type="video/mp4">
        <source src="midia/video-dog-ogv.ogv" type="video/mp4">
        <source src="midia/video-dog-webm.webm" type="video/mp4">
        <source src="midia/video-dog-m4v.m4v" type="video/mp4">
        <p>Seu navegador não tem compatibilidade com reprodução de vídeo</p>
    </video>

    <!--Quanto mais formatos tem e convertidos, mais compatível ele vai ser para mais nevegadores. Um video muito grande e quando hospedado na tag VIDEO dentro do próprio servidor, vai consumir muito tráfego de dados, e isso pode ficar muito caro para o cliente. -->

    <h1>Inserindo vídeos do YouTube</h1>
    <iframe width="500" height="315" src="https://www.youtube.com/embed/ehAPaXfyiig?si=1Yq_Z5x6Huh5lMF5" title="YouTube video player" frameborder="0" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share" referrerpolicy="strict-origin-when-cross-origin" allowfullscreen></iframe>

    <h1>Inserindo vídeo do Vimeo</h1>
    <iframe title="vimeo-player" src="https://player.vimeo.com/video/267490452?h=acf251d01c" width="500" height="360" frameborder="0" referrerpolicy="strict-origin-when-cross-origin" allow="autoplay; fullscreen; picture-in-picture; clipboard-write; encrypted-media; web-share"   allowfullscreen></iframe>

    <!--Melhor usar o YouTube pois usa a hospedagem dele e não do meu servidor. Mas ele fica aberto para todos verem. Caso queira privacidade para assinantes pode usar o vimeo (mas é pago). A qualidade do vimeo é muito boa, mas o algoritmo não é muito bom No vimeo tem um numero limitado para subir o video mas a tranferência de banda é ilimitada.-->

    
</body>
</html>
