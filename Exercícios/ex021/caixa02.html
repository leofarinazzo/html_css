<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Grouping Tags</title>

    <style>
        body{
            font-family: Arial, Helvetica, sans-serif;
            background-color: #F4F2EE;
            margin: 0px;
        }
        
        header{
            background-color: #FFF;
            padding: 10px;
            margin: 10px;
            border-radius: 5px;
            box-shadow: 5px 3px 7px 1px rgba(0, 0, 0, 0.267);
        }
        
        nav{
            background-color: #cac1c1;
            padding: 5px;
            
        }

        nav > a{
            text-decoration: none;
            color: #000;
            font-weight: bold;
            margin-right: 20px;
            
            
        }

        nav > :hover{
            text-decoration: underline;
            
        }

        main{
            background-color: #FFF;
            padding: 10px;
            margin: 10px;
            border-radius: 5px;
            box-shadow: 5px 3px 7px 1px rgba(0, 0, 0, 0.267);
        }

        article{
            background-color: #cfc1a5 ;
            padding: 5px;
        }

        article > aside{
            background-color: #a0947d;
        }

        footer{
            background-color: #818181;
            text-align: center;
            padding: 5px;
            margin: 0px;
        }

        footer > p{
            margin: 0px;
        }

        div#bola{
            height: 100px;
            width: 100px;
            margin: 10px;
            background-color: rgb(199, 169, 169);
            border-radius: 50%;         

        }
    </style>
</head>
<body>
    <header>
        <h1>Meu Site</h1>
        <nav>
            <a href="">Página inicial</a>
            <a href="">Sobre</a>
            <a href="">Quem sou eu</a>
            <a href="">Contatos</a>           
        </nav>
    </header>

    <main>
        <section id="Avisos">
            <p>Sala de aula virtual</p>
        </section>

        <section id="Cronograma">
            <article></article>
        </section>

        <section id="Links">
            <article>
                <h2>Links</h2>
                <p>Slides das aula:</p>
                <p>Estudos dirigidos:</p>
                <p>Provas</p>
                <aside>
                    <p>Os links dos slides baixarão os materias da aula.</p>
                </aside>

            </article>
        </section>



    </main>

    <footer>
        <p>Desenvolvido pelo professor Léo Farinazzo</p>

    </footer>

    <div id="bola"></div>
    
</body>
</html>
